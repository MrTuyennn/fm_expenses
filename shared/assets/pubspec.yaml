name: assets
description: Assets module
publish_to: "none"
version: 0.0.1
homepage:

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  lottie: ^3.3.2
  vector_graphics: ^1.1.11+1

dev_dependencies:
  build_runner: ^2.3.3
  flutter_gen_runner: ^5.8.0
  flutter_lints: ^6.0.0
  vector_graphics_compiler: ^1.1.11+1

flutter:
  assets:
    - fonts/
  fonts:
    - family: Quicksand
      fonts:
        - asset: fonts/Quicksand-Light.ttf
          weight: 300
        - asset: fonts/Quicksand-Regular.ttf
          weight: 400
        - asset: fonts/Quicksand-Medium.ttf
          weight: 500
        - asset: fonts/Quicksand-SemiBold.ttf
          weight: 600
        - asset: fonts/Quicksand-Bold.ttf
          weight: 700
    - family: ResIcons
      fonts:
        - asset: fonts/ResIcons.ttf
