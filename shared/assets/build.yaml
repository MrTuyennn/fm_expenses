targets:
  $default:
    builders:
      flutter_gen:
        options:
          output: lib/src
          line_length: 80

          integrations:
            flutter_svg: true
            rive: true
            lottie: true

          assets:
            enabled: true
            outputs:
              package_parameter_enabled: true
              class_name: ResAssets

          fonts:
            enabled: true
